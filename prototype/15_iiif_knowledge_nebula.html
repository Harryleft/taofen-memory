<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识星云 - 邹韬奋纪念网页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #64b5f6, #42a5f5, #2196f3, #1e88e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(33, 150, 243, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.6)); }
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .nebula-container {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 50px 0;
        }

        .knowledge-node {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        .knowledge-node:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(100, 181, 246, 0.6);
        }

        .knowledge-node.person {
            background: radial-gradient(circle, rgba(33, 150, 243, 0.8), rgba(33, 150, 243, 0.4));
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .knowledge-node.event {
            background: radial-gradient(circle, rgba(156, 39, 176, 0.8), rgba(156, 39, 176, 0.4));
            top: 40%;
            left: 20%;
            animation-delay: -1s;
        }

        .knowledge-node.work {
            background: radial-gradient(circle, rgba(76, 175, 80, 0.8), rgba(76, 175, 80, 0.4));
            top: 60%;
            right: 25%;
            animation-delay: -2s;
        }

        .knowledge-node.thought {
            background: radial-gradient(circle, rgba(255, 193, 7, 0.8), rgba(255, 193, 7, 0.4));
            bottom: 25%;
            left: 30%;
            animation-delay: -3s;
        }

        .knowledge-node.legacy {
            background: radial-gradient(circle, rgba(244, 67, 54, 0.8), rgba(244, 67, 54, 0.4));
            top: 35%;
            right: 15%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(-50%); }
            33% { transform: translateY(-10px) translateX(-50%); }
            66% { transform: translateY(5px) translateX(-50%); }
        }

        .node-content {
            text-align: center;
            padding: 10px;
        }

        .node-content i {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .node-content h3 {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .node-content p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(100, 181, 246, 0.6), transparent);
            transform-origin: left center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .connection-line.active {
            opacity: 1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .info-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .info-panel.active {
            right: 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .info-content h2 {
            color: #64b5f6;
            margin-bottom: 20px;
            font-size: 1.8rem;
            font-weight: 300;
        }

        .info-content p {
            line-height: 1.6;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .related-items {
            margin-top: 30px;
        }

        .related-items h3 {
            color: #42a5f5;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .related-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .related-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 181, 246, 0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 8s linear infinite;
        }

        @keyframes particle-float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .knowledge-node {
                width: 100px;
                height: 100px;
            }
            
            .info-panel {
                width: 100vw;
                right: -100vw;
            }
            
            .controls {
                bottom: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <header class="header">
            <h1>知识星云</h1>
            <p>探索邹韬奋的思想宇宙 - 每个星体都是一段历史，每条连线都是一个故事</p>
        </header>

        <div class="nebula-container" id="nebula">
            <div class="knowledge-node person" data-type="person" data-id="zou-taofen">
                <div class="node-content">
                    <i class="fas fa-user"></i>
                    <h3>邹韬奋</h3>
                    <p>1895-1944</p>
                </div>
            </div>

            <div class="knowledge-node event" data-type="event" data-id="life-weekly">
                <div class="node-content">
                    <i class="fas fa-newspaper"></i>
                    <h3>《生活》周刊</h3>
                    <p>1926年</p>
                </div>
            </div>

            <div class="knowledge-node work" data-type="work" data-id="mass-books">
                <div class="node-content">
                    <i class="fas fa-book"></i>
                    <h3>生活书店</h3>
                    <p>1932年</p>
                </div>
            </div>

            <div class="knowledge-node thought" data-type="thought" data-id="patriotism">
                <div class="node-content">
                    <i class="fas fa-heart"></i>
                    <h3>爱国情怀</h3>
                    <p>思想核心</p>
                </div>
            </div>

            <div class="knowledge-node legacy" data-type="legacy" data-id="journalism">
                <div class="node-content">
                    <i class="fas fa-feather-alt"></i>
                    <h3>新闻精神</h3>
                    <p>永恒遗产</p>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="info-content" id="infoContent">
            <!-- 动态内容 -->
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="resetBtn">
            <i class="fas fa-redo"></i> 重置视图
        </button>
        <button class="control-btn" id="autoBtn">
            <i class="fas fa-play"></i> 自动漫游
        </button>
        <button class="control-btn" id="filterBtn">
            <i class="fas fa-filter"></i> 筛选内容
        </button>
    </div>

    <script>
        // 数据模型
        const knowledgeData = {
            'zou-taofen': {
                title: '邹韬奋',
                type: 'person',
                description: '中国近代著名的新闻记者、出版家和爱国民主人士。原名邹恩润，1895年出生于福建永安，1944年在上海逝世。',
                details: '邹韬奋先生一生致力于新闻出版事业，创办《生活》周刊，建立生活书店，积极宣传抗日救国思想。他的"为人民服务"的新闻出版理念影响深远。',
                related: ['life-weekly', 'mass-books', 'patriotism', 'journalism']
            },
            'life-weekly': {
                title: '《生活》周刊',
                type: 'event',
                description: '1926年邹韬奋创办的进步刊物，成为当时最有影响力的媒体之一。',
                details: '《生活》周刊以"传播进步思想，服务社会大众"为宗旨，内容涵盖时事评论、文化教育、生活指导等多个方面。在九一八事变后，积极宣传抗日救国思想。',
                related: ['zou-taofen', 'patriotism', 'mass-books']
            },
            'mass-books': {
                title: '生活书店',
                type: 'work',
                description: '1932年建立的文化机构，出版进步书籍，传播新思想。',
                details: '生活书店成为进步文化的重要阵地，出版了大量的马克思主义著作和进步书籍，为中国革命事业培养了大批人才。',
                related: ['zou-taofen', 'life-weekly', 'journalism']
            },
            'patriotism': {
                title: '爱国情怀',
                type: 'thought',
                description: '邹韬奋先生一生的精神追求，"我生为中国人，死为中国魂，此志不渝"。',
                details: '他的爱国情怀体现在新闻出版事业的方方面面，始终站在人民立场，为民族独立和人民解放而奋斗。',
                related: ['zou-taofen', 'life-weekly', 'journalism']
            },
            'journalism': {
                title: '新闻精神',
                type: 'legacy',
                description: '为人民服务、坚持真理、勇于担当的新闻职业精神。',
                details: '邹韬奋先生的新闻精神至今仍在影响着中国的新闻事业，他的理念包括：说真话、办实事、为人民服务。',
                related: ['zou-taofen', 'mass-books', 'patriotism']
            }
        };

        // 初始化星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 创建粒子效果
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        // 连接线系统
        function createConnection(node1, node2) {
            const line = document.createElement('div');
            line.className = 'connection-line';
            document.getElementById('nebula').appendChild(line);
            
            function updateLine() {
                const rect1 = node1.getBoundingClientRect();
                const rect2 = node2.getBoundingClientRect();
                const containerRect = document.getElementById('nebula').getBoundingClientRect();
                
                const x1 = rect1.left + rect1.width / 2 - containerRect.left;
                const y1 = rect1.top + rect1.height / 2 - containerRect.top;
                const x2 = rect2.left + rect2.width / 2 - containerRect.left;
                const y2 = rect2.top + rect2.height / 2 - containerRect.top;
                
                const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
                
                line.style.width = length + 'px';
                line.style.left = x1 + 'px';
                line.style.top = y1 + 'px';
                line.style.transform = `rotate(${angle}deg)`;
            }
            
            updateLine();
            return line;
        }

        // 显示信息面板
        function showInfoPanel(dataId) {
            const data = knowledgeData[dataId];
            const panel = document.getElementById('infoPanel');
            const content = document.getElementById('infoContent');
            
            content.innerHTML = `
                <h2>${data.title}</h2>
                <p><strong>类型：</strong>${getTypeLabel(data.type)}</p>
                <p>${data.description}</p>
                <p>${data.details}</p>
                <div class="related-items">
                    <h3>相关连接</h3>
                    ${data.related.map(id => {
                        const related = knowledgeData[id];
                        return `
                            <div class="related-item" data-id="${id}">
                                <h4>${related.title}</h4>
                                <p>${getTypeLabel(related.type)}</p>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            
            panel.classList.add('active');
            
            // 显示相关连接线
            showConnections(dataId);
        }

        function getTypeLabel(type) {
            const labels = {
                'person': '人物',
                'event': '事件',
                'work': '作品',
                'thought': '思想',
                'legacy': '遗产'
            };
            return labels[type] || type;
        }

        // 显示连接线
        function showConnections(centerId) {
            // 清除现有连接线
            document.querySelectorAll('.connection-line').forEach(line => line.remove());
            
            const centerNode = document.querySelector(`[data-id="${centerId}"]`);
            const data = knowledgeData[centerId];
            
            data.related.forEach(relatedId => {
                const relatedNode = document.querySelector(`[data-id="${relatedId}"]`);
                if (relatedNode) {
                    const line = createConnection(centerNode, relatedNode);
                    setTimeout(() => line.classList.add('active'), 100);
                }
            });
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            // 定期创建粒子
            setInterval(createParticle, 2000);
            
            // 节点点击事件
            document.querySelectorAll('.knowledge-node').forEach(node => {
                node.addEventListener('click', function() {
                    const dataId = this.getAttribute('data-id');
                    showInfoPanel(dataId);
                });
            });
            
            // 关闭面板
            document.getElementById('closeBtn').addEventListener('click', function() {
                document.getElementById('infoPanel').classList.remove('active');
                document.querySelectorAll('.connection-line').forEach(line => line.remove());
            });
            
            // 相关项点击
            document.addEventListener('click', function(e) {
                if (e.target.closest('.related-item')) {
                    const item = e.target.closest('.related-item');
                    const dataId = item.getAttribute('data-id');
                    showInfoPanel(dataId);
                }
            });
            
            // 控制按钮
            document.getElementById('resetBtn').addEventListener('click', function() {
                document.querySelectorAll('.connection-line').forEach(line => line.remove());
                document.getElementById('infoPanel').classList.remove('active');
            });
            
            let autoMode = false;
            document.getElementById('autoBtn').addEventListener('click', function() {
                autoMode = !autoMode;
                this.innerHTML = autoMode ? '<i class="fas fa-pause"></i> 停止漫游' : '<i class="fas fa-play"></i> 自动漫游';
                
                if (autoMode) {
                    const nodes = document.querySelectorAll('.knowledge-node');
                    let index = 0;
                    
                    const autoShow = () => {
                        if (!autoMode) return;
                        const dataId = nodes[index].getAttribute('data-id');
                        showInfoPanel(dataId);
                        index = (index + 1) % nodes.length;
                        setTimeout(autoShow, 4000);
                    };
                    
                    autoShow();
                }
            });
            
            // 筛选功能
            document.getElementById('filterBtn').addEventListener('click', function() {
                const types = ['person', 'event', 'work', 'thought', 'legacy'];
                const currentType = this.getAttribute('data-filter');
                const nextType = types[(types.indexOf(currentType) + 1) % (types.length + 1)];
                
                this.setAttribute('data-filter', nextType);
                
                document.querySelectorAll('.knowledge-node').forEach(node => {
                    if (!nextType || node.getAttribute('data-type') === nextType) {
                        node.style.opacity = '1';
                        node.style.pointerEvents = 'auto';
                    } else {
                        node.style.opacity = '0.3';
                        node.style.pointerEvents = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
