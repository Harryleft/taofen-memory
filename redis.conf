# Redis开发环境配置
# 绑定所有网络接口
bind 0.0.0.0

# 设置密码
requirepass dev_redis_password_2024

# 端口
port 6379

# 后台运行
daemonize no

# 数据库数量
databases 16

# 内存管理
maxmemory 512mb
maxmemory-policy allkeys-lru

# 持久化配置
save 900 1      # 15分钟内至少1个key改变，则保存
save 300 10     # 5分钟内至少10个key改变，则保存
save 60 10000   # 1分钟内至少10000个key改变，则保存

# AOF持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 日志配置
loglevel notice
logfile ""

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接
timeout 300
tcp-keepalive 60

# 开发环境优化
rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes

# 集群配置（如果需要）
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000