# 本地开发环境Docker Compose配置
# 使用方法: docker-compose -f docker-compose.dev.yml up -d
services:
  # AI后端服务
  taofen_backend:
    image: node:20-alpine
    container_name: taofen_backend_dev
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - taofen_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
    ports:
      - "3001:3001"
    command: >
      sh -c "npm ci --omit=dev && node server.js"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Caddy反向代理
  caddy:
    image: caddy:2
    container_name: caddy_dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "5173:5173"
    depends_on:
      - taofen_backend
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./frontend:/srv/www/taofen_web/frontend:ro

volumes:
  caddy_data: {}
  caddy_config: {}
  taofen_node_modules: {}

networks:
  default:
    name: taofen_dev_network
