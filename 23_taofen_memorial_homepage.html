<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪念韬奋同志 - 130周年诞辰生平事迹展</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '宋体', serif;
            background: linear-gradient(135deg, #8B6F47, #A0845C, #B8956B);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景报纸纹理 */
        .newspaper-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 80% 60%, rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px, 60px 60px, 20px 20px, 20px 20px;
            z-index: 1;
        }

        /* 报纸片段装饰 */
        .newspaper-fragment {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(-5deg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        .fragment-1 {
            top: 10%;
            left: 5%;
            width: 150px;
            height: 200px;
        }

        .fragment-2 {
            top: 20%;
            right: 8%;
            width: 120px;
            height: 180px;
            transform: rotate(8deg);
        }

        .fragment-3 {
            bottom: 15%;
            left: 3%;
            width: 180px;
            height: 160px;
            transform: rotate(-12deg);
        }

        .fragment-4 {
            bottom: 25%;
            right: 5%;
            width: 140px;
            height: 190px;
            transform: rotate(6deg);
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 人物照片区域 */
        .portrait-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .main-portrait {
            width: 280px;
            height: 350px;
            background: linear-gradient(145deg, #f4f4f4, #e8e8e8);
            border: 8px solid rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                inset 0 2px 4px rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
            transform: translateY(-10px);
        }

        .main-portrait::before {
            content: '邹韬奋先生';
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .side-portrait {
            width: 150px;
            height: 200px;
            background: linear-gradient(145deg, #f0f0f0, #ddd);
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 6px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .side-portrait.left {
            transform: rotate(-3deg) translateY(20px);
        }

        .side-portrait.right {
            transform: rotate(3deg) translateY(20px);
        }

        /* 主标题 */
        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            color: #CC1E06;
            text-shadow: 
                3px 3px 0px #8B1A00,
                6px 6px 15px rgba(0,0,0,0.4);
            margin-bottom: 1rem;
            letter-spacing: 8px;
            position: relative;
            text-align: center;
        }

        .main-title::before,
        .main-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 3px;
            background: #CC1E06;
            transform: translateY(-50%);
        }

        .main-title::before {
            left: -80px;
        }

        .main-title::after {
            right: -80px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 2rem;
            color: #2C1810;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* 日期信息 */
        .date-info {
            font-size: 1.8rem;
            color: #8B6F47;
            font-weight: 500;
            margin-bottom: 3rem;
            letter-spacing: 2px;
            text-align: center;
            position: relative;
        }

        .date-info::before {
            content: '◆';
            margin-right: 10px;
            color: #CC1E06;
        }

        .date-info::after {
            content: '◆';
            margin-left: 10px;
            color: #CC1E06;
        }

        /* 导航卡片 */
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
            margin-top: 2rem;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(139, 111, 71, 0.3);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #CC1E06, #8B1A00);
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-card h3 {
            font-size: 1.3rem;
            color: #2C1810;
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-card p {
            color: #6B5B4F;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 印章效果 */
        .seal {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 80px;
            height: 80px;
            background: #CC1E06;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1.2;
            box-shadow: 0 4px 15px rgba(204, 30, 6, 0.4);
            letter-spacing: 1px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 3rem;
                letter-spacing: 4px;
            }

            .main-title::before,
            .main-title::after {
                width: 40px;
            }

            .main-title::before {
                left: -50px;
            }

            .main-title::after {
                right: -50px;
            }

            .subtitle {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .date-info {
                font-size: 1.3rem;
            }

            .portrait-section {
                gap: 1.5rem;
            }

            .main-portrait {
                width: 220px;
                height: 280px;
            }

            .side-portrait {
                width: 120px;
                height: 160px;
            }

            .nav-cards {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container > * {
            animation: fadeInUp 0.8s ease-out;
        }

        .portrait-section {
            animation-delay: 0.2s;
        }

        .main-title {
            animation-delay: 0.4s;
        }

        .subtitle {
            animation-delay: 0.6s;
        }

        .date-info {
            animation-delay: 0.8s;
        }

        .nav-cards {
            animation-delay: 1s;
        }
    </style>
</head>
<body>
    <!-- 背景纹理 -->
    <div class="newspaper-bg"></div>
    
    <!-- 报纸片段装饰 -->
    <div class="newspaper-fragment fragment-1"></div>
    <div class="newspaper-fragment fragment-2"></div>
    <div class="newspaper-fragment fragment-3"></div>
    <div class="newspaper-fragment fragment-4"></div>

    <!-- 印章 -->
    <div class="seal">
        纪念<br>展览
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 人物照片区域 -->
        <div class="portrait-section">
            <div class="side-portrait left"></div>
            <div class="main-portrait"></div>
            <div class="side-portrait right"></div>
        </div>

        <!-- 主标题 -->
        <h1 class="main-title">纪念韬奋同志</h1>

        <!-- 副标题 -->
        <h2 class="subtitle">130周年诞辰生平事迹展</h2>

        <!-- 日期信息 -->
        <div class="date-info">2025.7.22 ~ 9.24</div>

        <!-- 导航卡片 -->
        <div class="nav-cards">
            <div class="nav-card">
                <h3>⏱️ 生平时间线</h3>
                <p>追溯韬奋先生的人生足迹，从青年求学到投身新闻事业的光辉历程</p>
            </div>
            <div class="nav-card">
                <h3>📰 新闻理想</h3>
                <p>探寻韬奋先生的新闻思想，感受"为民主而奋斗"的崇高理念</p>
            </div>
            <div class="nav-card">
                <h3>🌟 思想贡献</h3>
                <p>领略韬奋先生的思想精髓，传承爱国主义和民主精神的宝贵财富</p>
            </div>
            <div class="nav-card">
                <h3>📚 历史文献</h3>
                <p>珍贵的历史资料和文献，见证那个时代的风云变幻</p>
            </div>
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer-info">
        韬奋纪念馆 · 服务号
    </div>

    <script>
        // 添加交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const navCards = document.querySelectorAll('.nav-card');
            
            navCards.forEach(card => {
                card.addEventListener('click', function() {
                    // 这里可以添加页面跳转逻辑
                    console.log('导航到:', this.querySelector('h3').textContent);
                });
            });

            // 人物照片悬停效果
            const portraits = document.querySelectorAll('.main-portrait, .side-portrait');
            portraits.forEach(portrait => {
                portrait.addEventListener('mouseenter', function() {
                    this.style.transform += ' scale(1.05)';
                    this.style.transition = 'transform 0.3s ease';
                });
                
                portrait.addEventListener('mouseleave', function() {
                    this.style.transform = this.style.transform.replace(' scale(1.05)', '');
                });
            });

            // 添加鼠标追踪光效
            document.addEventListener('mousemove', function(e) {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                document.body.style.background = `
                    radial-gradient(circle at ${x * 100}% ${y * 100}%, 
                    rgba(255, 255, 255, 0.1) 0%, 
                    transparent 50%),
                    linear-gradient(135deg, #8B6F47, #A0845C, #B8956B)
                `;
            });
        });
    </script>
</body>
</html>
