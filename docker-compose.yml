version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/var/www/ai4dh.com:ro
      - ./ssl:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - cantaloupe
    restart: unless-stopped
    networks:
      - ai4dh-network

  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - ai4dh-network

  # Cantaloupe IIIF服务
  cantaloupe:
    image: uclalibrary/cantaloupe:5.0.6
    volumes:
      - ./docker/cantaloupe/cantaloupe.properties:/etc/cantaloupe/cantaloupe.properties:ro
      - cantaloupe_cache:/var/cache/cantaloupe
      - ./images:/var/local/images:ro  # 图像文件目录
    environment:
      - JAVA_OPTS=-Xmx1.5g -Xms1g
    restart: unless-stopped
    networks:
      - ai4dh-network

  # Redis缓存（可选，用于AI API响应缓存）
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai4dh-network
    profiles:
      - with-redis

volumes:
  nginx_cache:
  cantaloupe_cache:
  redis_data:

networks:
  ai4dh-network:
    driver: bridge
