name: 数字报刊模块测试

on:
  push:
    paths:
      - 'frontend/src/components/newspapers/**'
      - 'frontend/src/pages/NewspapersPage.tsx'
      - 'frontend/src/styles/newspapers.css'
  pull_request:
    paths:
      - 'frontend/src/components/newspapers/**'
      - 'frontend/src/pages/NewspapersPage.tsx'
      - 'frontend/src/styles/newspapers.css'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
        browser: [chromium, firefox, webkit]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci
    
    - name: 运行单元测试
      working-directory: ./frontend
      run: npm run test:coverage -- --testPathPattern=newspapers
    
    - name: 上传覆盖率报告
      working-directory: ./frontend
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: newspapers
        name: newspapers-coverage
    
    - name: 运行E2E测试
      working-directory: ./frontend
      run: npx playwright test --project=${{ matrix.browser }} --grep="数字报刊"
    
    - name: 上传测试结果
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.browser }}
        path: frontend/test-results/
    
    - name: 上传E2E测试报告
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: frontend/playwright-report/

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci
    
    - name: 运行性能测试
      working-directory: ./frontend
      run: npx playwright test --config=playwright.config.ts --grep="性能测试"
    
    - name: 生成性能报告
      working-directory: ./frontend
      run: npm run test:performance-report
    
    - name: 上传性能报告
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: frontend/performance-report/

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci
    
    - name: 运行安全扫描
      working-directory: ./frontend
      run: npm audit --audit-level=moderate
    
    - name: 运行ESLint检查
      working-directory: ./frontend
      run: npm run lint -- --max-warnings=0