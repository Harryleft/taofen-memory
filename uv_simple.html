<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>UV查看器 - IIIF数字化期刊浏览系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/universalviewer@4.2.1/dist/uv.css"/>
  <style>
    html,body{height:100%;margin:0;overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif}
    #uv{width:100%;height:100%}
    .loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000}
    .error{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000;max-width:80%;padding:40px;background-color:#f8d7da;border:1px solid #f5c6cb;border-radius:8px;color:#721c24}
    .error h3{margin-top:0;color:#721c24}
    .error button{margin-top:15px;padding:10px 20px;background:#007cba;color:white;border:none;border-radius:4px;cursor:pointer}
  </style>
</head>
<body>
  <div id="uv" class="uv">
    <div class="loading">
      <div>正在加载Universal Viewer...</div>
      <div style="font-size:12px;color:#666;margin-top:10px;">请稍候</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/universalviewer@4.2.1/dist/umd/UV.js"></script>
  <script>
    // 1) URL 转换函数 - 将直接文件路径转换为 IIIF Image API 格式
    function convertToIIIFUrl(imageUrl) {
      console.log('🔧 [UV] 开始转换图像URL:', imageUrl);
      
      // 检查是否已经是 IIIF Image API 格式
      if (imageUrl.includes('/full/') && imageUrl.includes('/default.jpg')) {
        console.log('🔧 [UV] 已经是IIIF Image API格式，直接返回:', imageUrl);
        return imageUrl;
      }
      
      // 生产环境不再使用代理路径，直接处理
      if (imageUrl.startsWith('/proxy?url=')) {
        console.log('🔧 [UV] 检测到代理路径，解码原始URL:', imageUrl);
        const urlParams = new URLSearchParams(imageUrl.split('?')[1]);
        imageUrl = decodeURIComponent(urlParams.get('url'));
        console.log('🔧 [UV] 解码后的URL:', imageUrl);
      }
      
      // 使用URL对象进行更可靠的解析
      try {
        const urlObj = new URL(imageUrl);
        const baseUrl = urlObj.origin;
        
        // 提取路径部分，移除开头的/
        const fullPath = urlObj.pathname.replace(/^\/iiif\/3\//, '');
        
        console.log('🔧 [UV] URL解析结果:', {
          baseUrl: baseUrl,
          originalPath: urlObj.pathname,
          extractedPath: fullPath
        });
        
        // 智能编码：只编码特殊字符，保留路径结构
        const encodedPath = encodeURI(fullPath);
        console.log('🔧 [UV] 编码结果:', {
          original: fullPath,
          encoded: encodedPath
        });
        
        // 构建完整的 IIIF Image API URL
        const iiifUrl = `${baseUrl}/iiif/3/${encodedPath}/full/1024,/0/default.jpg`;
        console.log('✅ [UV] 图像URL转换完成:', iiifUrl);
        
        return iiifUrl;
      } catch (error) {
        console.error('❌ [UV] URL解析失败:', error);
        console.error('❌ [UV] 原始URL:', imageUrl);
        
        // 回退到旧的解析方法
        console.log('🔧 [UV] 使用回退解析方法...');
        const baseUrl = imageUrl.split('/iiif/3/')[0];
        const imagePath = imageUrl.split('/iiif/3/')[1];
        const encodedPath = encodeURI(imagePath);
        const iiifUrl = `${baseUrl}/iiif/3/${encodedPath}/full/1024,/0/default.jpg`;
        
        console.log('🔧 [UV] 回退方法结果:', iiifUrl);
        return iiifUrl;
      }
    }

    // 2) 拦截并重写所有fetch请求
    function setupRequestInterceptor() {
      const originalFetch = window.fetch;
      
      window.fetch = function(url, options) {
        console.log('🔍 [UV] 拦截fetch请求:', url);
        
        // 检测环境 - 生产环境不使用代理
        const isProduction = !url.includes('localhost') && !url.includes('127.0.0.1') && !url.includes('192.168.');
        console.log('🔍 [UV] 环境检测 - 生产环境:', isProduction);
        
        // 生产环境：直接访问，不使用代理
        if (url.includes('manifest.json') && url.startsWith('https://www.ai4dh.cn')) {
          if (isProduction) {
            console.log('🚀 [UV] 生产环境 - 直接访问manifest:', url);
            return originalFetch(url, options);
          } else {
            console.log('🛠️ [UV] 开发环境 - 转换为代理请求...');
            const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
            console.log('🛠️ [UV] 转换后的代理URL:', proxyUrl);
            return originalFetch(proxyUrl, options);
          }
        }
        
        // 如果是manifest请求，尝试重写
        if (url.includes('manifest.json')) {
          console.log('🔍 [UV] 检测到manifest请求，开始处理...');
          console.log('🔍 [UV] 请求URL:', url);
          console.log('🔍 [UV] 请求选项:', options);
          
          return originalFetch(url, options)
            .then(response => {
              console.log('🔍 [UV] Manifest响应状态:', response.status, response.statusText);
              console.log('🔍 [UV] 响应头:', [...response.headers.entries()]);
              
              if (!response.ok) {
                console.error('❌ [UV] Manifest响应错误:', response.status, response.statusText);
                return response;
              }
              
              return response.json()
                .then(manifest => {
                  console.log('✅ [UV] Manifest加载成功，开始重写图像URL...');
                  console.log('🔍 [UV] 原始manifest结构:', {
                    '@context': manifest['@context'],
                    type: manifest.type,
                    id: manifest.id,
                    label: manifest.label,
                    sequences: manifest.sequences ? manifest.sequences.length : 0,
                    canvases: manifest.sequences && manifest.sequences[0] ? manifest.sequences[0].canvases.length : 0
                  });
                  
                  // 递归重写manifest中的图像URL
                  function rewriteImageUrls(obj, path = '') {
                    if (typeof obj !== 'object' || obj === null) return obj;
                    
                    // 检查是否是图像对象
                    if (obj.type === 'Image' && obj.id) {
                      console.log(`🔧 [UV] 发现图像对象 (${path}):`, obj.id);
                      
                      // 改进的图像检测逻辑 - 支持多种格式
                      const imageExtensions = ['.jpg', '.jpeg', '.png', '.tif', '.tiff', '.jp2', '.jpx', '.webp'];
                      const url = obj.id.toLowerCase();
                      const isImageFile = imageExtensions.some(ext => url.includes(ext)) ||
                                        (url.includes('/iiif/') && url.includes('/full/'));
                      
                      if (isImageFile) {
                        const newId = convertToIIIFUrl(obj.id);
                        console.log(`✅ [UV] 图像URL重写完成 (${path}):`, newId);
                        obj.id = newId;
                      } else {
                        console.log(`⚠️ [UV] 跳过非图像文件 (${path}):`, obj.id);
                      }
                    }
                    
                    // 递归处理所有属性
                    for (const key in obj) {
                      if (obj[key] && typeof obj[key] === 'object') {
                        rewriteImageUrls(obj[key], path ? `${path}.${key}` : key);
                      } else if (Array.isArray(obj[key])) {
                        obj[key].forEach((item, index) => {
                          rewriteImageUrls(item, path ? `${path}.${key}[${index}]` : `${key}[${index}]`);
                        });
                      }
                    }
                    
                    return obj;
                  }
                  
                  const rewrittenManifest = rewriteImageUrls(manifest);
                  console.log('✅ [UV] Manifest重写完成');
                  
                  return new Response(
                    JSON.stringify(rewrittenManifest),
                    {
                      status: 200,
                      headers: {
                        'Content-Type': 'application/json',
                        'Access-Control-Allow-Origin': '*'
                      }
                    }
                  );
                })
                .catch(error => {
                  console.error('❌ [UV] 重写manifest失败:', error);
                  console.error('❌ [UV] 错误堆栈:', error.stack);
                  return response;
                });
            })
            .catch(error => {
              console.error('❌ [UV] manifest请求失败:', error);
              console.error('❌ [UV] 错误堆栈:', error.stack);
              return Promise.reject(error);
            });
        }
        
        // 如果是直接的图像文件请求，转换为IIIF Image API请求
        if (url.includes('.jpg') && !url.includes('/full/') && url.includes('/iiif/3/')) {
          console.log('🔍 [UV] 检测到直接图像请求:', url);
          
          // 检测环境
          const isProduction = !url.includes('localhost') && !url.includes('127.0.0.1') && !url.includes('192.168.');
          console.log('🔍 [UV] 图像请求环境检测 - 生产环境:', isProduction);
          
          // 生产环境直接访问，开发环境可选代理
          if (isProduction) {
            console.log('🚀 [UV] 生产环境 - 直接转换图像URL...');
            const iiifUrl = convertToIIIFUrl(url);
            console.log('🚀 [UV] 转换后的图像URL:', iiifUrl);
            return originalFetch(iiifUrl, options);
          } else {
            console.log('🛠️ [UV] 开发环境 - 图像请求处理...');
            const iiifUrl = convertToIIIFUrl(url);
            console.log('🛠️ [UV] 转换后的图像URL:', iiifUrl);
            return originalFetch(iiifUrl, options);
          }
        }
        
        // 其他请求直接放行
        console.log('🔍 [UV] 其他请求直接放行:', url);
        return originalFetch(url, options);
      };
      
      console.log('✅ [UV] 请求拦截器设置完成');
    }

    // 3) 预处理和重写manifest中的图像URL
    async function preprocessManifest(manifestUrl) {
      try {
        console.log('🔍 [UV] 开始预处理manifest:', manifestUrl);
        
        // 检测环境
        const isProduction = !manifestUrl.includes('localhost') && 
                           !manifestUrl.includes('127.0.0.1') && 
                           !manifestUrl.includes('192.168.');
        
        let finalManifestUrl = manifestUrl;
        
        // 如果是生产环境的ai4dh.cn URL，直接访问
        if (isProduction && manifestUrl.startsWith('https://www.ai4dh.cn')) {
          console.log('🚀 [UV] 生产环境 - 直接访问manifest:', manifestUrl);
        } else {
          console.log('🛠️ [UV] 开发环境或非ai4dh域名 - 使用原URL:', manifestUrl);
        }
        
        // 获取manifest内容
        const response = await fetch(finalManifestUrl);
        if (!response.ok) {
          console.error('❌ [UV] Manifest获取失败:', response.status, response.statusText);
          return null;
        }
        
        const manifest = await response.json();
        console.log('✅ [UV] Manifest加载成功，开始重写图像URL...');
        console.log('🔍 [UV] 原始manifest结构:', {
          '@context': manifest['@context'],
          type: manifest.type,
          id: manifest.id,
          label: manifest.label,
          sequences: manifest.sequences ? manifest.sequences.length : 0,
          canvases: manifest.sequences && manifest.sequences[0] ? manifest.sequences[0].canvases.length : 0
        });
        
        // 递归重写manifest中的图像URL
        function rewriteImageUrls(obj, path = '') {
          if (typeof obj !== 'object' || obj === null) return obj;
          
          // 检查是否是图像对象
          if (obj.type === 'Image' && obj.id) {
            console.log(`🔧 [UV] 发现图像对象 (${path}):`, obj.id);
            
            // 改进的图像检测逻辑 - 支持多种格式
            const imageExtensions = ['.jpg', '.jpeg', '.png', '.tif', '.tiff', '.jp2', '.jpx', '.webp'];
            const url = obj.id.toLowerCase();
            const isImageFile = imageExtensions.some(ext => url.includes(ext)) ||
                              (url.includes('/iiif/') && url.includes('/full/'));
            
            if (isImageFile) {
              const newId = convertToIIIFUrl(obj.id);
              console.log(`✅ [UV] 图像URL重写完成 (${path}):`, newId);
              obj.id = newId;
            } else {
              console.log(`⚠️ [UV] 跳过非图像文件 (${path}):`, obj.id);
            }
          }
          
          // 递归处理所有属性
          for (const key in obj) {
            if (obj[key] && typeof obj[key] === 'object') {
              rewriteImageUrls(obj[key], path ? `${path}.${key}` : key);
            } else if (Array.isArray(obj[key])) {
              obj[key].forEach((item, index) => {
                rewriteImageUrls(item, path ? `${path}.${key}[${index}]` : `${key}[${index}]`);
              });
            }
          }
          
          return obj;
        }
        
        const rewrittenManifest = rewriteImageUrls(manifest);
        console.log('✅ [UV] Manifest重写完成');
        
        // 创建Blob URL
        const blob = new Blob([JSON.stringify(rewrittenManifest)], { type: 'application/json' });
        const blobUrl = URL.createObjectURL(blob);
        console.log('🔧 [UV] 创建Blob URL:', blobUrl);
        
        return blobUrl;
      } catch (error) {
        console.error('❌ [UV] Manifest预处理失败:', error);
        return null;
      }
    }

    // 4) 初始化Universal Viewer
    async function initUV() {
      try {
        console.log('🚀 === 开始Universal Viewer初始化 ===');
        
        // 检测环境
        const isProduction = !window.location.hostname.includes('localhost') && 
                           !window.location.hostname.includes('127.0.0.1') && 
                           !window.location.hostname.includes('192.168.');
        console.log('🔍 [UV] 环境检测 - 生产环境:', isProduction);
        console.log('🔍 [UV] 当前域名:', window.location.hostname);
        console.log('🔍 [UV] 当前URL:', window.location.href);
        
        // 设置请求拦截器
        console.log('🔧 [UV] 设置请求拦截器...');
        setupRequestInterceptor();
        
        // 获取URL参数中的manifest
        const urlParams = new URLSearchParams(window.location.hash.split('?')[1] || '');
        const originalManifestUrl = decodeURIComponent(urlParams.get('iiifManifestId') || '');
        
        if (originalManifestUrl) {
          console.log('🔍 [UV] 发现manifest URL参数:', originalManifestUrl);
          
          // 预处理manifest
          const processedManifestUrl = await preprocessManifest(originalManifestUrl);
          
          if (processedManifestUrl) {
            // 更新URL参数
            const newHash = `#?iiifManifestId=${encodeURIComponent(processedManifestUrl)}&embedded=true`;
            window.location.hash = newHash;
            console.log('🔧 [UV] 已更新manifest URL为预处理后的Blob URL');
          }
        }
        
        // URL适配器
        console.log('🔧 [UV] 初始化URL适配器...');
        const urlAdapter = new UV.IIIFURLAdapter();
        console.log('✅ [UV] URL适配器初始化完成');
        
        // 获取初始数据
        console.log('🔍 [UV] 获取初始数据...');
        const data = urlAdapter.getInitialData({ embedded: true });
        console.log('🔍 [UV] 初始数据:', JSON.stringify(data, null, 2));
        
        // 初始化Universal Viewer
        console.log('🔧 [UV] 初始化Universal Viewer核心...');
        const uv = UV.init("uv", data);
        console.log('✅ [UV] Universal Viewer初始化成功');
        
        // 绑定URL适配器
        console.log('🔧 [UV] 绑定URL适配器...');
        urlAdapter.bindTo(uv);
        console.log('✅ [UV] URL适配器绑定完成');
        
        console.log('🎉 === Universal Viewer初始化完成 ===');
        
        // 窗口大小变化时重新调整
        window.addEventListener('resize', () => {
          try {
            uv.resize();
          } catch (e) {
            console.warn('调整窗口大小时出错:', e);
          }
        });
        
        // 如果是嵌入式，通知父窗口
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'uv-loaded',
            manifestId: data.manifest?.id || 'unknown'
          }, '*');
        }
        
      } catch (error) {
        console.error('❌ [UV] Universal Viewer初始化失败:', error);
        console.error('❌ [UV] 错误堆栈:', error.stack);
        showError('Universal Viewer加载失败: ' + error.message);
      }
    }

    // 5) 显示错误信息
    function showError(message) {
      const uvElement = document.getElementById('uv');
      if (uvElement) {
        uvElement.innerHTML = `
          <div class="error">
            <h3>❌ Universal Viewer加载失败</h3>
            <p><strong>错误:</strong> ${message}</p>
            <p>请检查浏览器控制台以获取详细错误信息。</p>
            <button onclick="location.reload()">重新加载页面</button>
          </div>
        `;
      }
    }

    // 6) 等待UV库加载完成
    async function waitForUV() {
      if (typeof window.UV !== 'undefined' && typeof window.UV.IIIFURLAdapter !== 'undefined') {
        await initUV();
      } else {
        setTimeout(waitForUV, 100);
      }
    }

    // 7) 启动初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', waitForUV);
    } else {
      waitForUV();
    }

    // 8) 测试URL转换函数
    function testURLConversion() {
      console.log('🧪 [UV] 开始测试URL转换函数...');
      
      const testUrls = [
        'https://www.ai4dh.cn/iiif/3/dazhongshenghuozhoukan/1-16-chuangkanhao/page_1.jpg',
        'https://www.ai4dh.cn/iiif/3/dazhongshenghuozhoukan/1-16-chuangkanhao/page_2.jpg',
        'https://www.ai4dh.cn/iiif/3/manifests/dazhongshenghuozhoukan/1-16-chuangkanhao/manifest.json'
      ];
      
      testUrls.forEach(url => {
        console.log('🧪 [UV] 测试URL:', url);
        if (url.includes('.jpg')) {
          const result = convertToIIIFUrl(url);
          console.log('🧪 [UV] 转换结果:', result);
        }
      });
    }

    // 9) 监听来自父窗口的消息
    window.addEventListener('message', function(event) {
      if (event.data.type === 'reload-uv') {
        console.log('🔄 [UV] 收到重新加载UV的消息');
        initUV();
      }
    });

    // 10) 页面加载完成后运行测试
    window.addEventListener('load', function() {
      setTimeout(testURLConversion, 2000);
    });
  </script>
</body>
</html>
