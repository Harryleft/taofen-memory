<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邹韬奋数据审核工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(86, 171, 47, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .data-table {
            margin: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .person-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ddd;
        }

        .person-name {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .person-category {
            color: #666;
            font-size: 0.9em;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .desc-cell {
            max-width: 300px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .link-cell a {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }

        .link-cell a:hover {
            text-decoration: underline;
        }

        .edit-btn {
            background: #ffc107;
            color: #212529;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: #e0a800;
            transform: translateY(-1px);
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-weight: 300;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 30px;
        }

        .pagination button {
            padding: 10px 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover,
        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            margin: 20px 30px;
            border-radius: 8px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: auto;
            }
            
            .stats {
                justify-content: center;
            }
            
            .data-table {
                margin: 15px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 14px;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>邹韬奋数据审核工具</h1>
            <p>人物关系数据的增删改查管理系统</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索人物姓名、类别或描述...">
                    <span class="search-icon">🔍</span>
                </div>
                <button class="btn btn-primary" onclick="loadData()">重新加载数据</button>
                <button class="btn btn-success" onclick="addPerson()">添加人物</button>
                <button class="btn btn-success" onclick="saveData()">导出文件</button>
                <button class="btn btn-primary" onclick="copyDataToClipboard()">复制数据</button>
            </div>
            
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">总人物数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="withImageCount">0</div>
                    <div class="stat-label">有图片</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="withDescCount">0</div>
                    <div class="stat-label">有描述</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="withSourceCount">0</div>
                    <div class="stat-label">有来源</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="withLinkCount">0</div>
                    <div class="stat-label">有链接</div>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div class="data-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>头像</th>
                        <th>姓名</th>
                        <th>类别</th>
                        <th>描述</th>
                        <th>来源</th>
                        <th>链接</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="8" class="loading">正在加载数据...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 编辑模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">编辑人物信息</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <div class="form-group">
                        <label for="editId">ID:</label>
                        <input type="number" id="editId" readonly>
                    </div>
                    <div class="form-group">
                        <label for="editName">姓名:</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">类别:</label>
                        <input type="text" id="editCategory" required>
                    </div>
                    <div class="form-group">
                        <label for="editImg">头像路径:</label>
                        <input type="text" id="editImg" placeholder="https://example.com/image.jpg 或 /local/path/image.jpg">
                    </div>
                    <div class="form-group">
                        <label for="editDesc">描述:</label>
                        <textarea id="editDesc" placeholder="请输入人物描述..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editSources">来源 (多个来源用逗号分隔):</label>
                        <input type="text" id="editSources" placeholder="上海图书馆人名规范库, 维基百科">
                    </div>
                    <div class="form-group">
                        <label for="editLink">链接 (多个链接用逗号分隔):</label>
                        <input type="text" id="editLink" placeholder="http://data.library.sh.cn/entity/person/..., https://zh.wikipedia.org/wiki/...">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="savePerson()">保存</button>
                <button class="btn" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let personsData = [];
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        let editingIndex = -1;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            
            // 搜索功能
            document.getElementById('searchInput').addEventListener('input', function() {
                filterData(this.value);
            });
        });

        // 加载数据
        async function loadData() {
            try {
                showAlert('正在加载数据...', 'info');
                const response = await fetch('/frontend/public/data/relationships.json');
                if (!response.ok) {
                    throw new Error('无法加载数据文件');
                }
                const data = await response.json();
                personsData = data.persons || [];
                filteredData = [...personsData];
                updateStats();
                renderTable();
                showAlert('数据加载成功！', 'success');
            } catch (error) {
                console.error('加载数据失败:', error);
                showAlert('加载数据失败: ' + error.message, 'error');
                // 如果无法从服务器加载，尝试使用示例数据
                loadSampleData();
            }
        }

        // 加载示例数据（用于演示）
        function loadSampleData() {
            personsData = [
                {
                    id: 1,
                    name: "邹韬奋",
                    category: "新闻出版",
                    img: "/public/data/images/relationships/20230628124722_4u.jpg",
                    desc: "邹韬奋（1895年11月5日—1944年7月24日），原名恩润，字韬奋，福建永安人，中国著名记者、出版家、政治活动家。",
                    sources: ["上海图书馆人名规范库", "维基百科"],
                    link: ["http://data.library.sh.cn/entity/person/jw5l5kzmesq4pdtl", "https://zh.wikipedia.org/wiki/邹韬奋"]
                },
                {
                    id: 2,
                    name: "梁启超",
                    category: "新闻出版",
                    img: "/public/data/images/relationships/20210924110353.jpg",
                    desc: "梁启超（1873年2月23日—1929年1月19日），字卓如，号任公，广东新会人，中国近代思想家、政治活动家、教育家、史学家、文学家。",
                    sources: ["上海图书馆人名规范库", "维基百科"],
                    link: ["http://data.library.sh.cn/entity/person/0rs2exbs4fq613y6", "https://zh.wikipedia.org/wiki/梁启超"]
                }
            ];
            filteredData = [...personsData];
            updateStats();
            renderTable();
            showAlert('已加载示例数据', 'info');
        }

        // 更新统计信息
        function updateStats() {
            const total = personsData.length;
            const withImage = personsData.filter(p => p.img && p.img.trim() !== '').length;
            const withDesc = personsData.filter(p => p.desc && p.desc.trim() !== '' && !p.desc.startsWith('Category:')).length;
            const withSource = personsData.filter(p => p.sources && Array.isArray(p.sources) && p.sources.length > 0).length;
            const withLink = personsData.filter(p => p.link && Array.isArray(p.link) && p.link.length > 0).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('withImageCount').textContent = withImage;
            document.getElementById('withDescCount').textContent = withDesc;
            document.getElementById('withSourceCount').textContent = withSource;
            document.getElementById('withLinkCount').textContent = withLink;
        }

        // 过滤数据
        function filterData(searchTerm) {
            if (!searchTerm.trim()) {
                filteredData = [...personsData];
            } else {
                const term = searchTerm.toLowerCase();
                filteredData = personsData.filter(person => 
                    person.name.toLowerCase().includes(term) ||
                    person.category.toLowerCase().includes(term) ||
                    (person.desc && person.desc.toLowerCase().includes(term))
                );
            }
            currentPage = 1;
            renderTable();
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #666;">没有找到匹配的数据</td></tr>';
                renderPagination();
                return;
            }

            tbody.innerHTML = pageData.map(person => `
                <tr>
                    <td>${person.id}</td>
                    <td>
                        ${person.img ? `<img src="${person.img}" alt="${person.name}" class="person-img" onerror="this.style.display='none'">` : '<div style="width:60px;height:60px;background:#eee;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#999;">无</div>'}
                    </td>
                    <td>
                        <div class="person-name">${person.name}</div>
                    </td>
                    <td>
                        <span class="person-category">${person.category}</span>
                    </td>
                    <td class="desc-cell">
                        ${person.desc ? person.desc.substring(0, 100) + (person.desc.length > 100 ? '...' : '') : '<span style="color:#999;">无描述</span>'}
                    </td>
                    <td>
                        ${person.sources && Array.isArray(person.sources) && person.sources.length > 0 ? person.sources.join(', ') : '<span style="color:#999;">无</span>'}
                    </td>
                    <td class="link-cell">
                        ${person.link && Array.isArray(person.link) && person.link.length > 0 ? 
                            person.link.map(url => `<a href="${url}" target="_blank" style="display:block;margin-bottom:2px;">${url.length > 30 ? url.substring(0, 30) + '...' : url}</a>`).join('') : 
                            '<span style="color:#999;">无</span>'}
                    </td>
                    <td>
                        <button class="edit-btn" onclick="editPerson(${person.id})">编辑</button>
                        <button class="delete-btn" onclick="deletePerson(${person.id})">删除</button>
                    </td>
                </tr>
            `).join('');

            renderPagination();
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHTML = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <button onclick="changePage(${i})" ${i === currentPage ? 'class="active"' : ''}>${i}</button>
                `;
            }

            paginationHTML += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;

            pagination.innerHTML = paginationHTML;
        }

        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        }

        // 编辑人物
        function editPerson(id) {
            const person = personsData.find(p => p.id === id);
            if (!person) return;

            editingIndex = personsData.findIndex(p => p.id === id);
            
            document.getElementById('modalTitle').textContent = '编辑人物信息';
            document.getElementById('editId').value = person.id;
            document.getElementById('editName').value = person.name;
            document.getElementById('editCategory').value = person.category;
            document.getElementById('editImg').value = person.img || '';
            document.getElementById('editDesc').value = person.desc || '';
            document.getElementById('editSources').value = Array.isArray(person.sources) ? person.sources.join(', ') : (person.sources || '');
            document.getElementById('editLink').value = Array.isArray(person.link) ? person.link.join(', ') : (person.link || '');
            
            document.getElementById('editModal').style.display = 'block';
        }

        // 添加人物
        function addPerson() {
            editingIndex = -1;
            const newId = Math.max(...personsData.map(p => p.id), 0) + 1;
            
            document.getElementById('modalTitle').textContent = '添加新人物';
            document.getElementById('editId').value = newId;
            document.getElementById('editName').value = '';
            document.getElementById('editCategory').value = '';
            document.getElementById('editImg').value = '';
            document.getElementById('editDesc').value = '';
            document.getElementById('editSources').value = '';
            document.getElementById('editLink').value = '';
            
            document.getElementById('editModal').style.display = 'block';
        }

        // 保存人物
        function savePerson() {
            const form = document.getElementById('editForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const sourcesValue = document.getElementById('editSources').value.trim();
            const linkValue = document.getElementById('editLink').value.trim();
            
            const personData = {
                id: parseInt(document.getElementById('editId').value),
                name: document.getElementById('editName').value.trim(),
                category: document.getElementById('editCategory').value.trim(),
                img: document.getElementById('editImg').value.trim(),
                desc: document.getElementById('editDesc').value.trim(),
                sources: sourcesValue ? sourcesValue.split(',').map(s => s.trim()).filter(s => s) : [],
                link: linkValue ? linkValue.split(',').map(l => l.trim()).filter(l => l) : []
            };

            if (editingIndex === -1) {
                // 添加新人物
                personsData.push(personData);
                showAlert('人物添加成功！', 'success');
            } else {
                // 更新现有人物
                personsData[editingIndex] = personData;
                showAlert('人物信息更新成功！', 'success');
            }

            filteredData = [...personsData];
            updateStats();
            renderTable();
            closeModal();
        }

        // 删除人物
        function deletePerson(id) {
            if (confirm('确定要删除这个人物吗？此操作不可撤销。')) {
                const index = personsData.findIndex(p => p.id === id);
                if (index !== -1) {
                    personsData.splice(index, 1);
                    filteredData = [...personsData];
                    updateStats();
                    renderTable();
                    showAlert('人物删除成功！', 'success');
                }
            }
        }

        // 保存数据到文件
        function saveData() {
            const dataToSave = {
                persons: personsData
            };
            
            const dataStr = JSON.stringify(dataToSave, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = 'relationships.json';
            link.click();
            
            showAlert('数据已导出！请将下载的文件手动复制到：s:/vibe_coding/taofen_web/frontend/public/data/relationships.json', 'success');
        }

        // 复制数据到剪贴板（用于手动保存）
        function copyDataToClipboard() {
            const dataToSave = {
                persons: personsData
            };
            
            const dataStr = JSON.stringify(dataToSave, null, 2);
            
            navigator.clipboard.writeText(dataStr).then(() => {
                showAlert('数据已复制到剪贴板！可以手动粘贴到 s:/vibe_coding/taofen_web/frontend/public/data/relationships.json 文件中', 'success');
            }).catch(err => {
                // 如果剪贴板API不可用，显示数据在文本框中
                showDataInModal(dataStr);
            });
        }

        // 在模态框中显示数据
        function showDataInModal(dataStr) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>复制以下数据到本地文件</h3>
                        <span onclick="this.parentElement.parentElement.parentElement.remove()" style="cursor:pointer;font-size:24px;">&times;</span>
                    </div>
                    <div style="padding: 20px;">
                        <p style="margin-bottom: 15px; color: #666;">请复制以下内容并保存到：<br><strong>s:/vibe_coding/taofen_web/frontend/public/data/relationships.json</strong></p>
                        <textarea readonly style="width: 100%; height: 400px; font-family: monospace; font-size: 12px; border: 1px solid #ddd; border-radius: 5px; padding: 10px;">${dataStr}</textarea>
                        <div style="margin-top: 15px; text-align: right;">
                            <button onclick="this.previousElementSibling.previousElementSibling.select(); document.execCommand('copy'); showAlert('已复制到剪贴板！', 'success');" style="background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-right: 10px;">复制数据</button>
                            <button onclick="this.parentElement.parentElement.parentElement.parentElement.remove()" style="background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">关闭</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // 显示提示信息
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-info';
            
            const alertHTML = `
                <div class="alert ${alertClass}" style="animation: slideIn 0.3s ease;">
                    ${message}
                </div>
            `;
            
            alertContainer.innerHTML = alertHTML;
            
            // 3秒后自动隐藏
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    alert.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => {
                        alertContainer.innerHTML = '';
                    }, 300);
                }
            }, 3000);
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateY(-20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateY(0); opacity: 1; }
                to { transform: translateY(-20px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
